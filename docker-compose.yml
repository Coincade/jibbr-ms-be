version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: jibbr
      POSTGRES_PASSWORD: jibbr_password
      POSTGRES_DB: jibbr_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U jibbr']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    ports:
      - '3001:3001'
    env_file:
      - services/auth-service/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  upload-service:
    build:
      context: .
      dockerfile: services/upload-service/Dockerfile
    ports:
      - '3002:3002'
    env_file:
      - services/upload-service/.env
    depends_on:
      redis:
        condition: service_healthy

  messaging-service:
    build:
      context: .
      dockerfile: services/messaging-service/Dockerfile
    ports:
      - '3003:3003'
    env_file:
      - services/messaging-service/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  socket-service:
    build:
      context: .
      dockerfile: services/socket-service/Dockerfile
    ports:
      - '3004:3004'
    env_file:
      - services/socket-service/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
