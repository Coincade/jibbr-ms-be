name: CD

on:
  push:
    branches: [docr]

concurrency:
  group: cd-docr
  cancel-in-progress: false   # never cancel a deploy in-flight

env:
  NODE_VERSION: '18'
  REGISTRY: registry.digitalocean.com
  DO_REGISTRY: ${{ secrets.DO_REGISTRY_NAME }}

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 1. Detect which services changed (skip unchanged image builds)
  # ─────────────────────────────────────────────────────────────────────────
  changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      auth:      ${{ steps.filter.outputs.auth }}
      upload:    ${{ steps.filter.outputs.upload }}
      messaging: ${{ steps.filter.outputs.messaging }}
      socket:    ${{ steps.filter.outputs.socket }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            auth:
              - 'services/auth-service/**'
              - 'packages/**'
              - 'package*.json'
              - 'turbo.json'
            upload:
              - 'services/upload-service/**'
              - 'packages/**'
              - 'package*.json'
              - 'turbo.json'
            messaging:
              - 'services/messaging-service/**'
              - 'packages/**'
              - 'package*.json'
              - 'turbo.json'
            socket:
              - 'services/socket-service/**'
              - 'packages/**'
              - 'package*.json'
              - 'turbo.json'

  # ─────────────────────────────────────────────────────────────────────────
  # 2. Build & push Docker images to DigitalOcean Container Registry
  # ─────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: changes
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: auth-service
            changed: ${{ needs.changes.outputs.auth }}
            app_id_secret: DO_AUTH_APP_ID
            port: 3001
          - service: upload-service
            changed: ${{ needs.changes.outputs.upload }}
            app_id_secret: DO_UPLOAD_APP_ID
            port: 3002
          - service: messaging-service
            changed: ${{ needs.changes.outputs.messaging }}
            app_id_secret: DO_MESSAGING_APP_ID
            port: 3003
          - service: socket-service
            changed: ${{ needs.changes.outputs.socket }}
            app_id_secret: DO_SOCKET_APP_ID
            port: 3004

    steps:
      - uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DigitalOcean Container Registry
        run: doctl registry login --expiry-seconds 1200

      - name: Set image tag
        id: tag
        run: echo "IMAGE=${{ env.REGISTRY }}/${{ env.DO_REGISTRY }}/${{ matrix.service }}:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build \
            --file services/${{ matrix.service }}/Dockerfile \
            --tag ${{ steps.tag.outputs.IMAGE }} \
            --tag ${{ env.REGISTRY }}/${{ env.DO_REGISTRY }}/${{ matrix.service }}:latest \
            --cache-from ${{ env.REGISTRY }}/${{ env.DO_REGISTRY }}/${{ matrix.service }}:latest \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            .
        env:
          DOCKER_BUILDKIT: '1'

      - name: Push Docker image
        run: |
          docker push ${{ steps.tag.outputs.IMAGE }}
          docker push ${{ env.REGISTRY }}/${{ env.DO_REGISTRY }}/${{ matrix.service }}:latest

      - name: Save image tag to output
        id: save
        run: echo "IMAGE_TAG=${{ steps.tag.outputs.IMAGE }}" >> $GITHUB_OUTPUT

    outputs:
      # individual matrix jobs don't share outputs natively; deploy job reads the SHA directly
      image_prefix: ${{ env.REGISTRY }}/${{ env.DO_REGISTRY }}

  # ─────────────────────────────────────────────────────────────────────────
  # 3. Run Prisma migrations (single job, runs once against prod DB)
  # ─────────────────────────────────────────────────────────────────────────
  migrate:
    name: Database Migration
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx turbo run db:generate
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

      - name: Run Prisma migrations
        run: npx prisma migrate deploy
        working-directory: packages/database
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

  # ─────────────────────────────────────────────────────────────────────────
  # 4. Deploy each service to DigitalOcean App Platform
  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [build-and-push, migrate]
    environment: staging
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: auth-service
            app_id_secret: DO_AUTH_APP_ID
          - service: upload-service
            app_id_secret: DO_UPLOAD_APP_ID
          - service: messaging-service
            app_id_secret: DO_MESSAGING_APP_ID
          - service: socket-service
            app_id_secret: DO_SOCKET_APP_ID

    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Update App Platform image tag
        run: |
          doctl apps update-component ${{ secrets[matrix.app_id_secret] }} \
            --component-name ${{ matrix.service }} \
            --image-tag ${{ github.sha }}
        continue-on-error: true   # fall back to force-deploy if update-component is unsupported

      - name: Trigger deployment
        run: |
          doctl apps create-deployment ${{ secrets[matrix.app_id_secret] }}

      - name: Wait for deployment to go live
        run: |
          echo "Waiting for ${{ matrix.service }} to reach ACTIVE state..."
          for i in $(seq 1 30); do
            STATUS=$(doctl apps get ${{ secrets[matrix.app_id_secret] }} --format ActiveDeployment.Phase --no-header 2>/dev/null || echo "UNKNOWN")
            echo "Attempt $i: $STATUS"
            if [ "$STATUS" = "ACTIVE" ]; then
              echo "${{ matrix.service }} is live"
              exit 0
            fi
            sleep 10
          done
          echo "Timed out waiting for ${{ matrix.service }}"
          exit 1

  # ─────────────────────────────────────────────────────────────────────────
  # 5. Post-deploy smoke test
  # ─────────────────────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Health-check all services
        run: |
          services=(
            "https://jibbr-auth-service-qg7e2.ondigitalocean.app/health"
            "https://jibbr-upload-service-qg7e2.ondigitalocean.app/health"
            "https://jibbr-messaging-service-qg7e2.ondigitalocean.app/health"
            "https://jibbr-socket-service-qg7e2.ondigitalocean.app/health"
          )
          for url in "${services[@]}"; do
            echo "Checking $url"
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$url")
            if [ "$STATUS" != "200" ]; then
              echo "FAIL: $url returned HTTP $STATUS"
              exit 1
            fi
            echo "OK: $url"
          done
